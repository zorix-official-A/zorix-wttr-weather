<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#eef5ff">
  <meta name="description" content="A ChatGPT-style real-time weather card powered by wttr.in.">
  <title>Zorix Weather Live</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="scene">
    <section class="phone-shell" aria-label="Live weather assistant">
      <header class="statusbar" aria-hidden="true">
        <span>16:12</span>
        <span class="status-icons">
          <span>5G</span>
          <span class="signal"></span>
          <span class="wifi"></span>
          <span class="battery">20</span>
        </span>
      </header>

      <div class="assistant-top">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M16 3.2 27.1 9.6v12.8L16 28.8 4.9 22.4V9.6L16 3.2Zm0 4.1-7.5 4.3v8.8l7.5 4.3 7.5-4.3v-8.8L16 7.3Z"/>
            <path d="M11.2 11.1h9.9l-8.3 9.8h8.9v2H8.9l8.3-9.8h-6v-2Z"/>
          </svg>
        </div>
        <span>Zorix Weather</span>
      </div>

      <article class="weather-card">
        <div class="card-head">
          <div>
            <p class="city" id="city">Loading...</p>
            <div class="temp-row">
              <strong id="temp">--</strong>
              <span class="unit">° <button id="unitF" class="unit-btn active" type="button">F</button> / <button id="unitC" class="unit-btn" type="button">C</button></span>
            </div>
          </div>
          <img id="mainIcon" class="main-icon" src="./assets/icons/cloud-sun.svg" alt="">
        </div>

        <p class="summary" id="summary">Fetching live weather from wttr.in...</p>

        <div class="forecast-strip" id="forecastStrip" aria-label="Six day forecast"></div>

        <div class="section-title">
          <button id="metricToggle" type="button">Temperature</button>
        </div>

        <div class="chart-wrap">
          <svg class="temp-chart" id="tempChart" viewBox="0 0 680 190" role="img" aria-label="Hourly temperature chart">
            <path id="chartLine" class="chart-line" d=""></path>
            <g id="chartDots"></g>
            <g id="chartLabels"></g>
          </svg>
        </div>
      </article>

      <section class="orb-area" aria-hidden="true">
        <div class="live-orb"></div>
      </section>

      <form class="ask-bar" id="searchForm">
        <button class="plus" type="button" aria-label="Add">+</button>
        <input id="locationInput" name="location" autocomplete="off" placeholder="Ask weather for a city" value="Denver">
        <button class="mic" type="button" aria-label="Voice">
          <svg viewBox="0 0 24 24"><path d="M12 14.5a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4.5a4 4 0 0 0 4 4Zm6-4a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93V22h2v-3.57a8 8 0 0 0 7-7.93h-2Z"/></svg>
        </button>
        <button class="close" type="button" aria-label="Close">×</button>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
