<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#f5f7fb">
  <title>Live Weather Card</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <article class="weather-card">
      <form class="search" id="searchForm">
        <input id="cityInput" value="Denver" placeholder="City name">
        <button type="submit">Update</button>
      </form>

      <section class="top">
        <div>
          <p class="place" id="place">Loading...</p>
          <div class="temp">
            <span id="temp">--</span>
            <small>° <button id="fBtn" class="active" type="button">F</button> / <button id="cBtn" type="button">C</button></small>
          </div>
        </div>
        <img id="icon" src="./assets/icons/cloud-sun.svg" alt="">
      </section>

      <p class="desc" id="desc">Reading live weather from wttr.in...</p>

      <section class="days" id="days"></section>

      <div class="label">Temperature</div>

      <svg class="chart" viewBox="0 0 680 190" aria-label="Hourly temperature">
        <path id="line" class="line"></path>
        <g id="dots"></g>
        <g id="labels"></g>
      </svg>

      <p class="stamp" id="stamp">Live data by wttr.in</p>
    </article>
  </main>

  <script src="./app.js"></script>
</body>
</html>
